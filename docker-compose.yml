version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: music_player_db
    restart: always
    environment:
      POSTGRES_DB: music_player
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
